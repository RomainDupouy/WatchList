<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Ma Watchlist 🎬</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ffffff;
    --surface: #F7F0E8;
    --border: #E8D5C0;
    --accent: #D99923;
    --accent2: #8C0E03;
    --text: #112226;
    --muted: #BF8A6B;
    --green: #2e7d32;
    --watching: #c17a00;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding-bottom: env(safe-area-inset-bottom);
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 100;
    opacity: 0.15;
  }

  /* ── HEADER ── */
  header {
    padding: 44px 44px 30px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 20px;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(36px, 7vw, 76px);
    letter-spacing: 4px;
    line-height: 1;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 6px;
  }

  .stats { display: flex; gap: 28px; align-items: center; }
  .stat { text-align: center; }
  .stat-num { font-family: 'Bebas Neue', sans-serif; font-size: 32px; line-height: 1; color: var(--accent); }
  .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; margin-top: 2px; }

  .progress-wrap { min-width: 140px; }
  .progress-bar { width: 100%; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; margin-top: 8px; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 2px; transition: width 0.5s ease; }

  /* ── TOOLBAR ── */
  .toolbar {
    padding: 12px 44px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    overflow-x: auto;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
  }
  .toolbar::-webkit-scrollbar { display: none; }

  .filter-btn {
    padding: 7px 16px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    border-radius: 24px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s ease;
    white-space: nowrap;
    flex-shrink: 0;
    min-height: 36px;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 500; }

  .toolbar-sep { width: 1px; height: 20px; background: var(--border); margin: 0 2px; flex-shrink: 0; }

  .add-btn {
    margin-left: auto;
    flex-shrink: 0;
    padding: 8px 18px;
    background: var(--accent);
    border: none;
    color: #000;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.2s;
    min-height: 36px;
  }
  .add-btn:hover { opacity: 0.85; }

  /* ── SECTION ── */
  .section { padding: 28px 44px; }

  .section-header { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
  .section-title { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 3px; color: var(--muted); }
  .section-count { font-size: 11px; color: var(--muted); background: var(--border); padding: 2px 8px; border-radius: 20px; }
  .section-line { flex: 1; height: 1px; background: var(--border); }

  /* ── LIST ROW ── */
  .list { display: flex; flex-direction: column; }

  .row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 13px 14px;
    border-radius: 8px;
    border: 1px solid transparent;
    transition: all 0.2s ease;
    animation: fadeIn 0.3s ease both;
    min-height: 52px;
  }
  .row:hover { background: var(--surface); border-color: var(--border); }

  .row.watching { border-left: 3px solid var(--watching); padding-left: 11px; }
  .row.seen { opacity: 0.45; }
  .row.seen:hover { opacity: 0.75; }

  /* separator between unseen / seen */
  .seen-divider {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 16px 14px 8px;
    animation: fadeIn 0.3s ease both;
  }
  .seen-divider span { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; white-space: nowrap; }
  .seen-divider::before, .seen-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* Priority dots */
  .row-priority { display: flex; flex-direction: column; gap: 3px; flex-shrink: 0; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
  .dot.empty { background: var(--border); }

  /* Main */
  .row-main { flex: 1; min-width: 0; display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
  .row-title { font-family: 'Bebas Neue', sans-serif; font-size: 17px; letter-spacing: 0.5px; }
  .row-year { font-size: 11px; color: var(--muted); font-weight: 300; flex-shrink: 0; }
  .row-desc { font-size: 11px; color: var(--muted); font-weight: 300; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 340px; }

  /* Rating stars on seen rows */
  .row-rating { font-size: 11px; flex-shrink: 0; letter-spacing: 1px; }

  /* Tags */
  .row-tags { display: flex; gap: 5px; flex-shrink: 0; }
  .tag { padding: 2px 8px; border-radius: 20px; font-size: 10px; letter-spacing: 0.5px; font-weight: 500; text-transform: uppercase; white-space: nowrap; }
  .tag-film  { background: rgba(140,14,3,.10); color: var(--accent2); border: 1px solid rgba(140,14,3,.25); }
  .tag-série { background: rgba(217,153,35,.15); color: #8a5e00; border: 1px solid rgba(217,153,35,.4); }
  .tag-platform { background: rgba(17,34,38,.06); color: var(--muted); border: 1px solid var(--border); }

  /* Actions */
  .row-actions {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .row:hover .row-actions { opacity: 1; }

  .btn-action {
    padding: 6px 13px;
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s ease;
    white-space: nowrap;
    min-height: 34px;
  }
  .btn-seen { border: 1px solid var(--border); background: transparent; color: var(--muted); }
  .btn-seen:hover { border-color: var(--green); color: var(--green); }
  .row.seen .btn-seen { border-color: var(--green); color: var(--green); background: rgba(46,125,50,.1); }

  .btn-delete { border: 1px solid transparent; background: transparent; color: var(--muted); font-size: 15px; padding: 5px 9px; }
  .btn-delete:hover { border-color: rgba(140,14,3,.35); color: var(--accent2); background: rgba(140,14,3,.07); }

  .btn-watching { border: 1px solid var(--border); background: transparent; color: var(--muted); }
  .btn-watching:hover { border-color: var(--watching); color: var(--watching); }
  .row.watching .btn-watching { border-color: var(--watching); color: var(--watching); background: rgba(193,122,0,.1); font-weight: 500; }

  /* Row clickable area */
  .row-click { flex: 1; min-width: 0; display: flex; align-items: center; gap: 14px; cursor: pointer; }
  .row-click:hover .row-title { color: var(--accent); }

  /* Empty */
  .empty-state { padding: 32px; text-align: center; color: var(--muted); font-size: 13px; }

  /* ── MODAL BASE ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(17,34,38,.55);
    z-index: 200;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(6px);
    padding: 16px;
  }
  .modal-overlay.open { display: flex; }

  /* ── RATING MODAL ── */
  .rating-modal {
    background: #ffffff;
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px 28px 26px;
    width: 340px;
    max-width: 100%;
    text-align: center;
    animation: popIn 0.25s ease;
  }
  .rating-modal h3 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    letter-spacing: 2px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 4px;
  }
  .rating-modal .rating-subtitle { font-size: 13px; color: var(--muted); margin-bottom: 24px; }

  .stars-row {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 28px;
  }
  .star-btn {
    font-size: 36px;
    background: none;
    border: none;
    cursor: pointer;
    transition: transform 0.15s ease, filter 0.15s ease;
    filter: grayscale(1) opacity(0.35);
    line-height: 1;
    padding: 4px;
    min-width: 44px;
    min-height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .star-btn.active { filter: grayscale(0) opacity(1); transform: scale(1.15); }
  .star-btn:hover { filter: grayscale(0) opacity(0.8); transform: scale(1.1); }

  .rating-footer { display: flex; gap: 10px; justify-content: center; }

  .btn-skip {
    padding: 10px 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    border-radius: 8px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    transition: all 0.2s;
    min-height: 44px;
  }
  .btn-skip:hover { color: var(--text); border-color: var(--muted); }

  .btn-rate {
    padding: 10px 26px;
    background: var(--accent);
    border: none;
    color: #000;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    transition: opacity 0.2s;
    min-height: 44px;
  }
  .btn-rate:hover { opacity: 0.85; }

  /* ── ADD MODAL ── */
  .modal {
    background: #ffffff;
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    width: 480px;
    max-width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    animation: fadeIn 0.2s ease;
  }
  .modal-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 2px;
    margin-bottom: 22px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .form-row { display: flex; gap: 12px; margin-bottom: 14px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; flex: 1; }
  .form-group label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
  .form-group input, .form-group select, .form-group textarea {
    background: #ffffff; border: 1px solid var(--border); color: var(--text);
    border-radius: 8px; padding: 10px 12px; font-family: 'DM Sans', sans-serif;
    font-size: 14px; outline: none; transition: border-color 0.2s;
    min-height: 44px;
  }
  .form-group textarea { resize: vertical; min-height: 72px; line-height: 1.5; }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--accent); }
  .form-group select option { background: #ffffff; color: var(--text); }

  .priority-select { display: flex; gap: 8px; margin-bottom: 20px; }
  .priority-opt {
    flex: 1; padding: 9px 6px; border: 1px solid var(--border); border-radius: 8px;
    background: transparent; color: var(--muted); cursor: pointer;
    font-family: 'DM Sans', sans-serif; font-size: 12px; text-align: center;
    transition: all 0.2s; min-height: 44px;
  }
  .priority-opt.selected { border-color: var(--accent); color: var(--accent); background: rgba(232,197,71,.08); }

  .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 4px; }
  .btn-cancel {
    padding: 10px 20px; border: 1px solid var(--border); background: transparent;
    color: var(--muted); border-radius: 8px; cursor: pointer; font-family: 'DM Sans', sans-serif;
    font-size: 13px; transition: all 0.2s; min-height: 44px;
  }
  .btn-cancel:hover { border-color: var(--text); color: var(--text); }
  .btn-confirm {
    padding: 10px 24px; background: var(--accent); border: none; color: #000;
    border-radius: 8px; cursor: pointer; font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 500; transition: opacity 0.2s; min-height: 44px;
  }
  .btn-confirm:hover { opacity: 0.85; }

  /* ── DELETE MODAL ── */
  .confirm-modal {
    background: #ffffff; border: 1px solid var(--border); border-radius: 14px;
    padding: 28px; width: 340px; max-width: 100%; text-align: center; animation: popIn 0.2s ease;
  }
  .confirm-modal h3 { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; color: var(--accent2); }
  .confirm-modal p { color: var(--muted); font-size: 14px; margin: 8px 0 22px; line-height: 1.6; }
  .confirm-modal strong { color: var(--text); }
  .confirm-footer { display: flex; gap: 10px; justify-content: center; }
  .btn-delete-confirm {
    padding: 10px 24px; background: var(--accent2); border: none; color: #fff;
    border-radius: 8px; cursor: pointer; font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 500; transition: opacity 0.2s; min-height: 44px;
  }
  .btn-delete-confirm:hover { opacity: 0.85; }

  /* ── FAB (mobile add button) ── */
  .fab {
    display: none; /* shown only in mobile media query */
    position: fixed;
    bottom: calc(24px + env(safe-area-inset-bottom));
    right: 20px;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: var(--accent2);
    border: none;
    color: #fff;
    font-size: 28px;
    line-height: 1;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(140,14,3,.3);
    z-index: 50;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .fab:active { transform: scale(0.92); }

  /* ── PROFILE SWITCHER ── */
  .profile-switcher {
    display: flex;
    gap: 6px;
    margin-top: 12px;
  }
  .profile-btn {
    padding: 5px 16px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    min-height: 32px;
  }
  .profile-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
  }
  .profile-btn:hover:not(.active) {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* ── MODAL TABS ── */
  .modal-tabs {
    display: flex;
    margin-bottom: 20px;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .modal-tab {
    flex: 1;
    padding: 9px 10px;
    border: none;
    background: transparent;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    min-height: 40px;
  }
  .modal-tab.active { background: var(--accent); color: #000; font-weight: 500; }

  /* ── COPY LIST ── */
  .copy-list {
    max-height: 320px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 5px;
    margin-bottom: 8px;
  }
  .copy-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .copy-item:hover { border-color: var(--accent); background: rgba(217,153,35,0.05); }
  .copy-item-title { flex: 1; font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 0.5px; }
  .copy-item-year  { font-size: 11px; color: var(--muted); flex-shrink: 0; }

  .hidden { display: none !important; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes popIn {
    from { opacity: 0; transform: scale(0.92); }
    to { opacity: 1; transform: scale(1); }
  }

  /* ══════════════════════════════════════
     MOBILE  ≤ 680px
  ══════════════════════════════════════ */
  @media (max-width: 680px) {

    /* ── Header ── */
    header {
      flex-direction: column;
      align-items: flex-start;
      padding: 22px 18px 16px;
      gap: 14px;
    }
    .logo { font-size: 44px; }
    .subtitle { font-size: 10px; }

    /* Stats : grille 3 colonnes, barre de progression masquée */
    .stats {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0;
      background: var(--surface);
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .stat {
      padding: 10px 6px;
      border-right: 1px solid var(--border);
    }
    .stat:last-child { border-right: none; }
    .stat-num { font-size: 22px; }
    .stat-label { font-size: 9px; letter-spacing: 1px; }
    .progress-wrap { display: none; }

    /* ── Toolbar ── */
    .toolbar { padding: 10px 14px; gap: 7px; }
    .toolbar .add-btn { display: none; }

    /* ── Section ── */
    .section { padding: 16px 14px 80px; } /* padding-bottom pour le FAB */
    .section-title { font-size: 16px; }

    /* ── Rows : layout 1 ligne ── */
    .row {
      padding: 10px;
      gap: 8px;
      border: 1px solid transparent;
    }
    .row:hover { border-color: var(--border); }
    .row.watching { border-left: 3px solid var(--watching); padding-left: 7px; }

    .row-tags { display: none; }
    .row-main { flex-wrap: nowrap; align-items: center; }
    .row-title { display: block; font-size: 15px; flex: 1 1 0; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* Actions toujours visibles */
    .row-actions { opacity: 1; }
    .btn-action { font-size: 11px; padding: 6px 10px; min-height: 34px; }

    /* ── FAB ── */
    .fab { display: flex; }

    /* ── Modals : bottom sheet ── */
    .modal-overlay {
      align-items: flex-end;
      padding: 0;
    }
    .modal, .rating-modal, .confirm-modal {
      border-radius: 20px 20px 0 0;
      width: 100%;
      max-width: 100%;
      padding-bottom: calc(20px + env(safe-area-inset-bottom));
    }
    .modal { max-height: 92vh; padding: 22px 18px; }
    .rating-modal { padding: 28px 20px 20px; }
    .form-row { flex-direction: column; gap: 10px; }
    .priority-select { flex-direction: column; gap: 6px; }
    .priority-opt { min-height: 44px; }
    .star-btn { font-size: 32px; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div>
    <div class="logo">MA WATCHLIST</div>
    <div class="subtitle">Films &amp; Séries à voir</div>
    <div class="profile-switcher">
      <button class="profile-btn active" onclick="switchProfile('Romain', this)">Romain</button>
      <button class="profile-btn" onclick="switchProfile('Helenou', this)">Helenou</button>
    </div>
  </div>
  <div class="stats">
    <div class="stat">
      <div class="stat-num" id="total-count">—</div>
      <div class="stat-label">À voir</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="watching-count" style="color:var(--watching)">—</div>
      <div class="stat-label">En cours</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="seen-count">—</div>
      <div class="stat-label">Vus ✓</div>
    </div>
    <div class="progress-wrap">
      <div class="stat-label">Progression</div>
      <div class="progress-bar">
        <div class="progress-fill" id="progress" style="width:0%"></div>
      </div>
    </div>
  </div>
</header>

<!-- TOOLBAR -->
<div class="toolbar">
  <button class="filter-btn active" onclick="setFilter('all',this)">Tout</button>
  <button class="filter-btn" onclick="setFilter('film',this)">Films</button>
  <button class="filter-btn" onclick="setFilter('série',this)">Séries</button>
  <div class="toolbar-sep"></div>

<script>
// ══════════════════════════════════════

    { title:"Tenet",                               year:2020, platform:"Netflix",      genres:["Action","Sci-fi"],     desc:"", priority:2 },
    { title:"The Substance",                       year:2024, platform:"Autre",        genres:["Horreur","Sci-fi"],    desc:"", priority:3 },
    { title:"Me Before You",                       year:2016, platform:"Autre",        genres:["Romance","Drame"],      desc:"", priority:2 },
  ]
};

// ══════════════════════════════════════
// FIREBASE
// ══════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyCzv5iEfU2F0qb5k3-GEXbPeOAj4TxVaYs",
  authDomain: "watchlist-180d4.firebaseapp.com",
  projectId: "watchlist-180d4",
  storageBucket: "watchlist-180d4.firebasestorage.app",
  messagingSenderId: "996579734413",
  appId: "1:996579734413:web:61cfea5decd3a431c703c4",
  databaseURL: "https://watchlist-180d4-default-rtdb.europe-west1.firebasedatabase.app"
};
firebase.initializeApp(firebaseConfig);
const db    = firebase.database();
const dbRef = db.ref('watchlist');

// ══════════════════════════════════════
// STATE
// ══════════════════════════════════════
let currentProfile = 'Romain';
let fbSnapshot     = null;

let data          = JSON.parse(JSON.stringify(defaultData));
let ratings       = {};
let seenSet       = new Set();
let watchingSet   = new Set();
let deletedTitles = new Set();
let currentFilter  = 'all';
let selPriority    = 2;
let pendingDelete  = null;

// rating modal state
let pendingRating      = 0;
let ratingTarget       = null; // { title, type, index }

// ══════════════════════════════════════
// RENDER
// ══════════════════════════════════════
function starsHTML(n) {
  if (!n) return '';
  return '★'.repeat(n) + '☆'.repeat(5 - n);
}

function createRow(item, type, index) {
  const isSeen     = seenSet.has(item.title);
  const isWatching = !isSeen && watchingSet.has(item.title);
  const rowClass   = isSeen ? 'seen' : (isWatching ? 'watching' : '');
  const dots       = [0,1,2].map(i => `<div class="dot ${i < item.priority ? '' : 'empty'}"></div>`).join('');
  const rating     = ratings[item.title];
  const ratingEl   = isSeen && rating
    ? `<span class="row-rating" style="color:var(--accent)">${starsHTML(rating)}</span>`
    : (isSeen ? `<span class="row-rating" style="color:var(--muted)">vu</span>` : '');

  const safeTitle = item.title.replace(/\\/g,'\\\\').replace(/'/g,"\\'");

  const watchBtn = !isSeen ? `
    <button class="btn-action btn-watching"
      onclick="toggleWatching('${safeTitle}',event)">
      En cours
    </button>` : '';

  return `<div class="row ${rowClass}"
       id="row-${type}-${index}"
       data-type="${type}"
       data-platform="${item.platform.toLowerCase()}"
       data-priority="${item.priority}"
       data-watching="${isWatching}">
    <div class="row-click" onclick="openEditModal('${type}',${index})">
      <div class="row-priority">${dots}</div>
      <div class="row-main">
        <span class="row-title">${item.title}</span>
        <span class="row-year">${item.year}</span>
        ${ratingEl}
      </div>
      <div class="row-tags">
        <span class="tag tag-${type}">${type}</span>
        <span class="tag tag-platform">${item.platform}</span>
      </div>
    </div>
    <div class="row-actions">
      ${watchBtn}
      <button class="btn-action btn-seen"
        onclick="clickSeen('${safeTitle}','${type}',${index},this)">
        ${isSeen ? '✓ Vu' : 'Marquer vu'}
      </button>
      <button class="btn-action btn-delete"
        onclick="openDeleteModal('${type}',${index},'${safeTitle}')">🗑</button>
    </div>
  </div>`;
}

function byPriority(a, b) { return b.priority - a.priority; }

function renderSection(items, type, listId) {
  const unseen   = items.filter(it => !seenSet.has(it.title) && !watchingSet.has(it.title)).sort(byPriority);
  const watching = items.filter(it => !seenSet.has(it.title) &&  watchingSet.has(it.title)).sort(byPriority);
  const seen     = items.filter(it =>  seenSet.has(it.title)).sort(byPriority);

  let html = '';
  unseen.forEach(it => { html += createRow(it, type, items.indexOf(it)); });

  if (watching.length) {
    html += `<div class="seen-divider"><span>En cours</span></div>`;
    watching.forEach(it => { html += createRow(it, type, items.indexOf(it)); });
  }
  if (seen.length) {
    html += `<div class="seen-divider"><span>Déjà vus ✓</span></div>`;
    seen.forEach(it => { html += createRow(it, type, items.indexOf(it)); });
  }

  document.getElementById(listId).innerHTML = html || '<div class="empty-state">Rien ici</div>';
}

function render() {
  renderSection(data.series, 'série', 'series-list');
  renderSection(data.films,  'film',  'films-list');
  applyFilter(currentFilter);
  updateStats();
}

// ══════════════════════════════════════
// FILTER
// ══════════════════════════════════════
function setFilter(type, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = type;
  applyFilter(type);
}

function applyFilter(type) {
  document.querySelectorAll('.row').forEach(row => {
    let show = false;
    if      (type === 'all')      show = true;
    else if (type === 'film')     show = row.dataset.type === 'film';
    else if (type === 'série')    show = row.dataset.type === 'série';
    else if (type === 'netflix')  show = row.dataset.platform.includes('netflix');
    else if (type === 'apple')    show = row.dataset.platform.includes('apple');
    else if (type === 'disney')   show = row.dataset.platform.includes('disney');
    else if (type === 'unseen')   show = !row.classList.contains('seen') && !row.classList.contains('watching');
    else if (type === 'watching') show = row.classList.contains('watching');
    else if (type === 'priority') show = row.dataset.priority === '3';
    row.classList.toggle('hidden', !show);
  });

  ['series','films'].forEach(sec => {
    const list    = document.getElementById(sec + '-list');
    const section = document.getElementById('section-' + sec);
    const visible = [...list.querySelectorAll('.row:not(.hidden)')];
    section.classList.toggle('hidden', visible.length === 0);
    document.getElementById('count-' + sec).textContent = visible.length;
  });
}

// ══════════════════════════════════════
// STATS
// ══════════════════════════════════════
function updateStats() {
  const all          = [...data.series, ...data.films];
  const total        = all.length;
  const seenCount    = all.filter(it => seenSet.has(it.title)).length;
  const watchCount   = all.filter(it => watchingSet.has(it.title)).length;
  document.getElementById('total-count').textContent    = total - seenCount - watchCount;
  document.getElementById('watching-count').textContent = watchCount;
  document.getElementById('seen-count').textContent     = seenCount;
  document.getElementById('progress').style.width       = total ? (seenCount / total * 100) + '%' : '0%';
}

function saveData()     { dbRef.child('profiles/' + currentProfile + '/data').set(data); }
function saveSeen()     { dbRef.child('profiles/' + currentProfile + '/seen').set([...seenSet]); }
function saveWatching() { dbRef.child('profiles/' + currentProfile + '/watching').set([...watchingSet]); }
function saveRatings()  { dbRef.child('profiles/' + currentProfile + '/ratings').set(ratings); }
function saveDeleted()  { dbRef.child('profiles/' + currentProfile + '/deleted').set([...deletedTitles]); }

function loadProfile(fb, name) {
  const profile = ((fb || {}).profiles || {})[name] || {};
  const d       = profile.data || JSON.parse(JSON.stringify(defaultData));
  data = {
    films:  Array.isArray(d.films)  ? d.films  : [],
    series: Array.isArray(d.series) ? d.series : []
  };
  seenSet       = new Set(Array.isArray(profile.seen)    ? profile.seen    : []);
  watchingSet   = new Set(Array.isArray(profile.watching) ? profile.watching : []);
  ratings       = (profile.ratings && typeof profile.ratings === 'object') ? profile.ratings : {};
  deletedTitles = new Set(Array.isArray(profile.deleted) ? profile.deleted : []);
}

function switchProfile(name, btn) {
  currentProfile = name;
  document.querySelectorAll('.profile-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (fbSnapshot) { loadProfile(fbSnapshot, name); render(); }
}

// ══════════════════════════════════════
// WATCHING
// ══════════════════════════════════════
function toggleWatching(title, e) {
  e.stopPropagation();
  if (watchingSet.has(title)) {
    watchingSet.delete(title);
  } else {
    watchingSet.add(title);
    seenSet.delete(title); // can't be both
  }
  saveWatching(); saveSeen();
  render();
}

// ══════════════════════════════════════
// SEEN + RATING FLOW
// ══════════════════════════════════════
function clickSeen(title, type, index, btn) {
  if (seenSet.has(title)) {
    // unmark
    seenSet.delete(title);
    delete ratings[title];
    saveSeen(); saveRatings();
    render();
  } else {
    // remove from watching if needed, then open rating modal
    watchingSet.delete(title);
    saveWatching();
    ratingTarget  = { title, type, index };
    pendingRating = 0;
    document.getElementById('rating-title-label').textContent = title;
    document.querySelectorAll('.star-btn').forEach(s => s.classList.remove('active'));
    const confirmBtn = document.getElementById('btn-rate-confirm');
    confirmBtn.disabled = true;
    confirmBtn.style.opacity = '0.5';
    document.getElementById('rating-modal').classList.add('open');
  }
}

function selectStar(n) {
  pendingRating = n;
  document.querySelectorAll('.star-btn').forEach((s, i) => {
    s.classList.toggle('active', i < n);
  });
  const confirmBtn = document.getElementById('btn-rate-confirm');
  confirmBtn.disabled = false;
  confirmBtn.style.opacity = '1';
}

function confirmSeen(rating) {
  if (!ratingTarget) return;
  const { title } = ratingTarget;
  seenSet.add(title);
  if (rating > 0) ratings[title] = rating;
  saveSeen(); saveRatings();
  ratingTarget = null; pendingRating = 0;
  document.getElementById('rating-modal').classList.remove('open');
  render();
}

// ══════════════════════════════════════
// DELETE
// ══════════════════════════════════════
function openDeleteModal(type, index, title) {
  pendingDelete = { type, index };
  document.getElementById('delete-name').textContent = title;
  document.getElementById('delete-modal').classList.add('open');
}
function closeDeleteModal() {
  document.getElementById('delete-modal').classList.remove('open');
  pendingDelete = null;
}
function confirmDelete() {
  if (!pendingDelete) return;
  const { type, index } = pendingDelete;
  const arr   = type === 'série' ? data.series : data.films;
  const title = arr[index].title;
  arr.splice(index, 1);
  seenSet.delete(title);
  watchingSet.delete(title);
  delete ratings[title];
  deletedTitles.add(title);
  // Écriture atomique pour éviter les conflits avec onValue
  const update = {};
  update['profiles/' + currentProfile + '/data']     = data;
  update['profiles/' + currentProfile + '/seen']     = [...seenSet];
  update['profiles/' + currentProfile + '/watching'] = [...watchingSet];
  update['profiles/' + currentProfile + '/ratings']  = ratings;
  update['profiles/' + currentProfile + '/deleted']  = [...deletedTitles];
  dbRef.update(update);
  closeDeleteModal();
  render();
}

// ══════════════════════════════════════
// ADD
// ══════════════════════════════════════
function openAddModal() {
  const other = currentProfile === 'Romain' ? 'Helenou' : 'Romain';
  document.getElementById('other-profile-label').textContent = other;
  setAddMode('new', document.getElementById('tab-new'));
  document.getElementById('add-modal').classList.add('open');
  setTimeout(() => document.getElementById('f-title').focus(), 100);
}
function closeAddModal() {
  document.getElementById('add-modal').classList.remove('open');
  ['f-title','f-year','f-genres'].forEach(id => document.getElementById(id).value = '');
  selPriority = 2;
  document.querySelectorAll('#add-modal .priority-opt').forEach((b,i) => b.classList.toggle('selected', i===1));
}

function setAddMode(mode, btn) {
  document.querySelectorAll('.modal-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('add-form-new').style.display  = mode === 'new'  ? '' : 'none';
  document.getElementById('add-form-copy').style.display = mode === 'copy' ? '' : 'none';
  if (mode === 'copy') renderCopyList();
}

function renderCopyList() {
  const other       = currentProfile === 'Romain' ? 'Helenou' : 'Romain';
  const otherPro    = ((fbSnapshot || {}).profiles || {})[other] || {};
  const otherD      = otherPro.data || { films: [], series: [] };
  const otherFilms  = Array.isArray(otherD.films)  ? otherD.films  : [];
  const otherSeries = Array.isArray(otherD.series) ? otherD.series : [];
  const inCurrent   = new Set([...data.films.map(f => f.title), ...data.series.map(s => s.title)]);

  const items = [
    ...otherSeries.map(s => ({ ...s, _type: 'série' })),
    ...otherFilms.map(f  => ({ ...f, _type: 'film'  }))
  ].filter(it => !inCurrent.has(it.title));

  const list = document.getElementById('copy-list');
  if (!items.length) {
    list.innerHTML = '<div class="empty-state">Aucun titre à copier</div>';
    return;
  }
  list.innerHTML = items.map(it => {
    const safe = it.title.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    return `<div class="copy-item" onclick="copyItem('${safe}','${it._type}')">
      <span class="copy-item-title">${it.title}</span>
      <span class="copy-item-year">${it.year}</span>
      <span class="tag tag-${it._type}">${it._type}</span>
    </div>`;
  }).join('');
}

function copyItem(title, type) {
  const other    = currentProfile === 'Romain' ? 'Helenou' : 'Romain';
  const otherPro = ((fbSnapshot || {}).profiles || {})[other] || {};
  const otherD   = otherPro.data || { films: [], series: [] };
  const arr      = type === 'série'
    ? (Array.isArray(otherD.series) ? otherD.series : [])
    : (Array.isArray(otherD.films)  ? otherD.films  : []);
  const item = arr.find(it => it.title === title);
  if (!item) return;
  if (type === 'série') data.series.unshift({ ...item });
  else                  data.films.unshift({ ...item });
  saveData();
  closeAddModal();
  render();
}
function setPriority(v, btn) {
  selPriority = v;
  document.querySelectorAll('.priority-opt').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}
// ══════════════════════════════════════
// EDIT
// ══════════════════════════════════════
let editTarget = null; // { type, index }
let selEditPriority = 2;

function openEditModal(type, index) {
  const arr  = type === 'série' ? data.series : data.films;
  const item = arr[index];
  if (!item) return;
  editTarget = { type, index };
  selEditPriority = item.priority;

  document.getElementById('e-title').value    = item.title;
  document.getElementById('e-year').value     = item.year;
  document.getElementById('e-genres').value   = (item.genres || []).join(', ');
  document.getElementById('e-type').value     = type;

  // platform
  const platformSel = document.getElementById('e-platform');
  [...platformSel.options].forEach(o => { o.selected = o.value === item.platform; });

  // priority
  document.querySelectorAll('#e-priority-select .priority-opt').forEach((b, i) => {
    b.classList.toggle('selected', i + 1 === selEditPriority);
  });

  document.getElementById('edit-modal').classList.add('open');
  setTimeout(() => document.getElementById('e-title').focus(), 100);
}

function closeEditModal() {
  document.getElementById('edit-modal').classList.remove('open');
  editTarget = null;
}

function setEditPriority(v, btn) {
  selEditPriority = v;
  document.querySelectorAll('#e-priority-select .priority-opt').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}

function saveEdit() {
  if (!editTarget) return;
  const title = document.getElementById('e-title').value.trim();
  if (!title) { document.getElementById('e-title').focus(); return; }

  const { type, index } = editTarget;
  const newType  = document.getElementById('e-type').value;
  const year     = parseInt(document.getElementById('e-year').value) || new Date().getFullYear();
  const platform = document.getElementById('e-platform').value;
  const genres   = document.getElementById('e-genres').value.split(',').map(g => g.trim()).filter(Boolean);

  const srcArr  = type === 'série' ? data.series : data.films;
  const oldTitle = srcArr[index].title;
  const item    = { ...srcArr[index], title, year, platform, genres: genres.length ? genres : ['Autre'], priority: selEditPriority };

  // Handle type change
  if (newType !== type) {
    srcArr.splice(index, 1);
    const destArr = newType === 'série' ? data.series : data.films;
    destArr.unshift(item);
  } else {
    srcArr[index] = item;
  }

  // Migrate seen/rating if title changed
  if (oldTitle !== title) {
    if (seenSet.has(oldTitle))     { seenSet.delete(oldTitle);     seenSet.add(title); }
    if (watchingSet.has(oldTitle)) { watchingSet.delete(oldTitle); watchingSet.add(title); }
    if (ratings[oldTitle] !== undefined) { ratings[title] = ratings[oldTitle]; delete ratings[oldTitle]; }
    saveSeen(); saveWatching(); saveRatings();
  }

  saveData();
  closeEditModal();
  render();
}

function addItem() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { document.getElementById('f-title').focus(); return; }
  const type     = document.getElementById('f-type').value;
  const year     = parseInt(document.getElementById('f-year').value) || new Date().getFullYear();
  const platform = document.getElementById('f-platform').value;
  const genres   = document.getElementById('f-genres').value.split(',').map(g => g.trim()).filter(Boolean);
  const item     = { title, year, platform, genres: genres.length ? genres : ['Autre'], priority: selPriority };
  if (type === 'série') data.series.unshift(item);
  else                  data.films.unshift(item);
  saveData();
  closeAddModal();
  render();
}

// ══════════════════════════════════════
// MODAL CLOSE HANDLERS
// ══════════════════════════════════════
['add-modal','edit-modal','delete-modal','rating-modal'].forEach(id => {
  document.getElementById(id).addEventListener('click', e => {
    if (e.target !== e.currentTarget) return;
    if (id === 'add-modal')    closeAddModal();
    if (id === 'edit-modal')   closeEditModal();
    if (id === 'delete-modal') closeDeleteModal();
    if (id === 'rating-modal') { document.getElementById('rating-modal').classList.remove('open'); ratingTarget = null; }
  });
});

document.addEventListener('keydown', e => {
  if (e.key !== 'Escape') return;
  closeAddModal(); closeEditModal(); closeDeleteModal();
  document.getElementById('rating-modal').classList.remove('open');
  ratingTarget = null;
});

// ══════════════════════════════════════
// INIT — Firebase realtime listener
// ══════════════════════════════════════
function init() {
  ['series-list','films-list'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.innerHTML = '<div class="empty-state">Chargement...</div>';
  });

  dbRef.on('value', snapshot => {
    try {
      const fb = snapshot.val();
      fbSnapshot = fb;
      if (fb && fb.profiles) {
        loadProfile(fb, currentProfile);

        // Merge nouveaux items defaultData pas encore dans le profil actif
        const filmTitles  = new Set(data.films.map(f => f.title));
        const serieTitles = new Set(data.series.map(s => s.title));
        let needsSave = false;
        defaultData.films.forEach(f => {
          if (!filmTitles.has(f.title) && !deletedTitles.has(f.title)) { data.films.push(f); needsSave = true; }
        });
        defaultData.series.forEach(s => {
          if (!serieTitles.has(s.title) && !deletedTitles.has(s.title)) { data.series.push(s); needsSave = true; }
        });
        if (needsSave) dbRef.child('profiles/' + currentProfile + '/data').set(data);
      } else {
        // Première fois — on initialise Firebase avec 2 profils indépendants
        const fresh = JSON.parse(JSON.stringify(defaultData));
        dbRef.set({
          profiles: {
            Romain:  { data: fresh, seen: [], watching: [], ratings: {}, deleted: [] },
            Helenou: { data: JSON.parse(JSON.stringify(defaultData)), seen: [], watching: [], ratings: {}, deleted: [] }
          }
        });
      }
      render();
    } catch(e) {
      console.error('Firebase error:', e);
      ['series-list','films-list'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.innerHTML = '<div class="empty-state">Erreur de chargement</div>';
      });
    }
  });
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>
